<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DiveTools - Label</title>
    <link rel="stylesheet" href="./src/styles/main.css">
    <link rel="stylesheet" href="./src/styles/label.css">
</head>
<body>
<div class="label">
    <h2 class="label__title" id="display-large-gastype">Gas Analysis</h2>

    <div class="label__row">
        <span>O2: <b id="display-o2"></b>%</span>
        <span>He: <b id="display-he"></b>%</span>
    </div>

    <div class="label__hero">
        <b id="display-large-label"></b><small id="display-large-units"></small>
    </div>

    <div class="label__row">PSI/BAR:</div>

    <div class="label__row label__row--analyst">
        <span>Date:<br><b id="display-date"></b></span>
        <span>Analyst:<br><b id="display-name"></b></span>
    </div>
</div>
<script type="module" src="./src/label.js"></script>
</body>
</html>
