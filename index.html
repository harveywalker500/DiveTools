<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DiveTools</title>
  <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body>
<div class="app-container">
  <h1>Gas Analysis Label Generator</h1>

  <form id="labelForm" class="panel">
    <label>O2 (%)
      <input type="number" name="o2" step="0.1" min="0" max="100" required>
    </label>
    <label>He (%)
      <input type="number" name="he" step="0.1" min="0" max="100" required>
    </label>
    <label>PPO2
      <input type="number" name="po2" step="0.1" min="0" max="1.6" required>
    </label>
    <label>Units
      <select name="units" required>
        <option value="imperial">Imperial</option>
        <option value="metric">Metric</option>
      </select>
    </label>
    <label>Rounding
      <select name="rounding" required>
        <option value="2">1</option>
        <option value="3">0.1</option>
        <option value="4">0.01</option>
      </select>
    </label>

    <hr>

    <label>Analysis Date
      <input type="date" name="analysisDate" required>
    </label>
    <label>Analysed By
      <input type="text" name="analystName" placeholder="Your Name" required>
    </label>

    <button type="submit">Print Label</button>
  </form>
</div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
